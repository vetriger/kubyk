<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Татусігри — Кубик</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #111114;
  color: #f0ede8;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 3rem;
  background-image:
    radial-gradient(ellipse at 20% 0%,  rgba(245,200,66,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 95%, rgba(232,69,60,0.05)  0%, transparent 55%);
  -webkit-text-size-adjust: 100%;
}

/* ── TOP LABEL ── */
.top-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: #f5c842;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
  opacity: 0.85;
}

h1 {
  font-size: clamp(2.2rem, 8vw, 4.5rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  color: #f5c842;
  text-shadow: 0 0 50px rgba(245,200,66,0.2);
  margin-bottom: 0.15rem;
  text-align: center;
}

.sub {
  font-size: 0.65rem;
  color: #4e4e5a;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

/* ── SELECTOR ── */
.selector {
  display: flex;
  gap: 0.4rem;
  background: #1e1e24;
  padding: 0.3rem;
  border-radius: 12px;
  border: 1px solid #2c2c36;
  margin-bottom: 2.5rem;
}

.sel {
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.45rem 1.1rem;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: #4e4e5a;
  cursor: pointer;
  -webkit-appearance: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

.sel.on {
  background: #f5c842;
  color: #000;
}

/* ── DICE ── */
.dice-row {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  align-items: center;
  margin-bottom: 2.2rem;
  flex-wrap: wrap;
  min-height: 124px;
}

.die-wrap {
  position: relative;
  width: 108px;
  height: 108px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

.die-face {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  background: #1e1e24;
  border: 1.5px solid #2c2c36;
  box-shadow: 0 6px 28px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  display: grid;
  grid-template-areas:
    "tl . tr"
    "ml c mr"
    "bl . br";
  grid-template-columns: repeat(3,1fr);
  grid-template-rows: repeat(3,1fr);
  padding: 14px;
  position: relative;
}

.die-face::after {
  content:'';
  position:absolute; inset:0;
  border-radius:inherit;
  background:linear-gradient(140deg,rgba(255,255,255,0.06) 0%,transparent 55%);
  pointer-events:none;
}

.die-face.lit {
  border-color: #f5c842;
  box-shadow: 0 0 22px rgba(245,200,66,0.22), 0 6px 28px rgba(0,0,0,0.5);
}

/* Flip overlay for animation */
.die-flip {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: #1e1e24;
  opacity: 0;
  pointer-events: none;
}

.pip {
  place-self: center;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: #f5c842;
  box-shadow: 0 0 7px rgba(245,200,66,0.6);
}
.pip.h { opacity: 0; }

.p-tl{grid-area:tl} .p-tr{grid-area:tr}
.p-ml{grid-area:ml} .p-c {grid-area:c}  .p-mr{grid-area:mr}
.p-bl{grid-area:bl} .p-br{grid-area:br}

/* ── BUTTON ── */
.roll-btn {
  font-size: 1.05rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.85rem 3rem;
  background: #f5c842;
  color: #000;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(245,200,66,0.28);
  margin-bottom: 2rem;
  -webkit-appearance: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  width: auto;
  display: block;
}

/* ── RESULT ── */
.result {
  text-align: center;
  min-height: 72px;
  margin-bottom: 2rem;
}

.res-num {
  font-size: 3.6rem;
  font-weight: 900;
  line-height: 1;
  color: #e8453c;
  letter-spacing: -0.02em;
  text-shadow: 0 0 36px rgba(232,69,60,0.38);
  opacity: 0.15;
}

.res-num.show { opacity: 1; }

.res-label {
  font-size: 0.66rem;
  color: #4e4e5a;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}

/* ── HISTORY ── */
.hist-wrap { width: 100%; max-width: 440px; }
.hist-head {
  font-size: 0.62rem; color: #4e4e5a;
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 0.6rem;
  display:flex; align-items:center; gap:0.5rem;
}
.hist-head::after { content:''; flex:1; height:1px; background:#2c2c36; }

.chips { display:flex; flex-wrap:wrap; gap:0.3rem; }

.chip {
  font-family: 'Courier New', monospace;
  font-size: 0.72rem;
  padding: 0.2rem 0.6rem;
  background: #1e1e24;
  border: 1px solid #2c2c36;
  border-radius: 50px;
  color: #4e4e5a;
}
.chip.new { border-color: #f5c842; color: #f5c842; background: rgba(245,200,66,0.07); }
.empty { font-size:0.72rem; color:#4e4e5a; font-style:italic; }

/* ── SHARE NOTE ── */
.share-note {
  margin-top: 2.5rem;
  font-size: 0.63rem;
  color: #3a3a46;
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.7;
}
</style>
</head>
<body>

<div class="top-label">Татусігри</div>
<h1>КУБИК</h1>
<p class="sub">Кубик для гри з дітьми</p>

<div class="selector">
  <button class="sel on" data-n="1" onclick="setN(1)">1 кубик</button>
  <button class="sel"    data-n="2" onclick="setN(2)">2 кубики</button>
  <button class="sel"    data-n="3" onclick="setN(3)">3 кубики</button>
</div>

<div class="dice-row" id="diceRow"></div>

<button class="roll-btn" id="rollBtn" onclick="rollAll()">🎲 Кинути</button>

<div class="result">
  <div class="res-num" id="resNum">—</div>
  <div class="res-label" id="resLabel">натисни «кинути»</div>
</div>

<div class="hist-wrap">
  <div class="hist-head">Історія кидків</div>
  <div class="chips" id="chips"><span class="empty">поки порожньо…</span></div>
</div>

<div class="share-note">
  Щоб відкрити в будь-якому браузері — збережи файл і відкрий у Chrome / Safari
</div>

<script>
var N = 1;
var rolling = false;
var hist = [];

var PIPS = {
  1:{c:1},
  2:{tl:1,br:1},
  3:{tl:1,c:1,br:1},
  4:{tl:1,tr:1,bl:1,br:1},
  5:{tl:1,tr:1,c:1,bl:1,br:1},
  6:{tl:1,tr:1,ml:1,mr:1,bl:1,br:1}
};
var SLOTS = ['tl','tr','ml','c','mr','bl','br'];

function pipHTML(val) {
  var cfg = PIPS[val] || {};
  return SLOTS.map(function(s){
    return '<div class="pip p-'+s+(cfg[s]?'':' h')+'"></div>';
  }).join('');
}

function setFace(idx, val, lit) {
  var face = document.getElementById('face-'+idx);
  if (!face) return;
  face.innerHTML = pipHTML(val);
  face.className = 'die-face' + (lit ? ' lit' : '');
}

function buildDice() {
  var row = document.getElementById('diceRow');
  row.innerHTML = '';
  for (var i = 0; i < N; i++) {
    (function(idx){
      var wrap = document.createElement('div');
      wrap.className = 'die-wrap';
      var face = document.createElement('div');
      face.className = 'die-face';
      face.id = 'face-'+idx;
      face.innerHTML = pipHTML(1);
      wrap.appendChild(face);
      wrap.onclick = function(){ rollAll(); };
      row.appendChild(wrap);
    })(i);
  }
  document.getElementById('resNum').className = 'res-num';
  document.getElementById('resNum').textContent = '—';
  document.getElementById('resLabel').textContent = 'натисни «кинути»';
}

function setN(n) {
  if (n === N) return;
  N = n;
  var btns = document.querySelectorAll('.sel');
  for (var i = 0; i < btns.length; i++) {
    var btn = btns[i];
    btn.className = 'sel' + (parseInt(btn.getAttribute('data-n')) === n ? ' on' : '');
  }
  hist = [];
  document.getElementById('chips').innerHTML = '<span class="empty">поки порожньо…</span>';
  buildDice();
}

function rnd() { return Math.ceil(Math.random() * 6); }
function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

async function rollAll() {
  if (rolling) return;
  rolling = true;

  var ticks = 7 + Math.floor(Math.random() * 4);

  // Fast random face shuffle
  for (var r = 0; r < ticks; r++) {
    for (var i = 0; i < N; i++) {
      setFace(i, rnd(), false);
    }
    await sleep(70 + r * 18);
  }

  // Pause — blank flash
  for (var i = 0; i < N; i++) {
    var f = document.getElementById('face-'+i);
    if (f) { f.style.opacity = '0.3'; }
  }
  await sleep(90);

  // Final values
  var finals = [];
  for (var i = 0; i < N; i++) {
    finals.push(rnd());
    var f = document.getElementById('face-'+i);
    if (f) { f.style.opacity = '1'; }
    setFace(i, finals[i], true);
  }

  // Show result
  var sum = finals.reduce(function(a,b){return a+b;}, 0);

  var el = document.getElementById('resNum');
  el.className = 'res-num show';
  el.textContent = N > 1 ? finals.join(' + ') + ' = ' + sum : '' + sum;
  document.getElementById('resLabel').textContent =
    N === 1 ? 'випало ' + sum : 'сума = ' + sum;

  addHist(finals, sum);

  // Remove lit after 1.5s
  setTimeout(function(){
    for (var i = 0; i < N; i++) {
      setFace(i, finals[i], false);
    }
    rolling = false;
  }, 1500);
}

function addHist(vals, sum) {
  hist.unshift({vals:vals,sum:sum});
  if (hist.length > 40) hist.pop();
  var el = document.getElementById('chips');
  el.innerHTML = '';
  for (var i = 0; i < hist.length; i++) {
    var e = hist[i];
    var c = document.createElement('span');
    c.className = 'chip' + (i===0?' new':'');
    c.textContent = N > 1 ? '['+e.vals.join(',')+']→'+e.sum : ''+e.vals[0];
    el.appendChild(c);
  }
}

buildDice();
</script>
</body>
</html>
